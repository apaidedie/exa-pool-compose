name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Show versions
        run: |
          node -v
          npm -v

      - name: Run smoke test
        run: node --experimental-sqlite smoke-test.js

